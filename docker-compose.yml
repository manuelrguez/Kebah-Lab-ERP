version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kebab_lab_db
    environment:
      POSTGRES_DB: kebab_lab_erp
      POSTGRES_USER: kebab_user
      POSTGRES_PASSWORD: kebab_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kebab_user -d kebab_lab_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kebab_lab_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kebab_user:kebab_pass@postgres:5432/kebab_lab_erp
      PORT: 3001
      NODE_ENV: development
    env_file: ./backend/.env
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: kebab_lab_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
